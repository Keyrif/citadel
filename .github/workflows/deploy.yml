name: Citadel Azure
on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            echo "Succesfully connected to Azure!"

            # pulling code from GitHub into the main folder
            echo "[PULL] Moving to root directory..."
            cd ${{ secrets.SERVER_PATH }} && git pull origin main && echo "[OK] Pulling succesfully executed!" || { echo "[ERROR] Pulling failed!"; exit 1; }

            # building the website for production use
            cd ${{ secrets.WEBSITE_PATH }} && npm install && npm run build && echo "[OK] Building succesfully executed!" || { echo "[ERROR] Building failed..."; exit 1; }

            # nginx
            echo "[NGINX] Reloading..."
            sudo service nginx reload && echo "Deployment successful on Azure!" || { echo "Deployment failed!"; exit 1; }





